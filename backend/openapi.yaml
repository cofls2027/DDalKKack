  /api/receipts/upload: 
    post: 
      tags: [Receipts]
      summary: 단일 영수증 업로드 
      description: | 
        영수증 이미지를 업로드하면: 
        1. Supabase Storage 저장 
        2. FastAPI AI OCR 분석 
        3. 규정 검증 
        4. DB 저장 
        을 수행합니다. 
      security: 
        - bearerAuth: [] 
      requestBody: 
        required: true 
        content: 
          multipart/form-data: 
            schema: 
              type: object
              required: 
                - image 
              properties: 
                image: 
                  type: string 
                  format: binary 
                  description: 영수증 이미지 파일 
                
                card_type: 
                  type: string 
                  example: 회사카드 
                
                headcount: 
                  type: integer 
                  example: 3 
                
      responses: 
        '201': 
          description: 업로드 성공 
          content: 
            application/json: 
              schema: 
                type: object 
                properties: 
                  receipt: 
                    $ref: '#/components/schemas/Receipt' 
                  ai: 
                    $ref: '#/components/schemas/AIAnalyzeResponse' 
        
        '400': 
          $ref: '#/components/responses/BadRequest' 
        
        '401': 
          $ref: '#/components/responses/Unauthorized' 
        
        '413': 
          description: 파일 크기 초과 
        
        '500': 
          $ref: '#/components/responses/InternalError' 
  /api/receipts/batch: 
    post: 
      tags: [Receipts] 
      summary: 영수증 배치 업로드 
      description: 최대 10개의 영수증 이미지를 한 번에 업로드합니다. 
      security: 
        - bearerAuth: [] 
      
      requestBody: 
        required: true 
        content: 
          multipart/form-data: 
            schema: 
              type: object 
              required: 
               - images 
              properties: 
                images: 
                  type: array 
                  items: 
                    type: string 
                    format: binary 
              
                card_type: 
                  type: string 
                  example: 회사카드 
                
                headcount: 
                  type: integer 
                  example: 2 
      responses: 
        '207': 
          description: 배치 처리 완료 
          content: 
            application/json: 
              schema: 
                type: object 
                properties: 
                  total: 
                    type: integer 
                  
                  succeeded: 
                    type: integer 
                  
                  failed: 
                    type: integer 
                
                  results: 
                    type: array 
                    items: 
                      type: object 
                      properties: 
                        success: 
                          type: boolean 
                      
                        filename: 
                          type: string 
                        
                        receipt: 
                          $ref: '#/components/schemas/Receipt' 
        '400': 
          description: 최대 10장 제한 
          
        '401': 
          $ref: '#/components/responses/Unauthorized' 
        
        '500': 
          $ref: '#/components/responses/InternalError' 
  /api/receipts: 
    get: 
      tags: [Receipts] 
      summary: 내 영수증 목록 조회 
      security: 
        - bearerAuth: [] 
      parameters: 
        - name: status 
          in: query 
          schema: 
            type: string 
            enum: [approved, pending, rejected] 
        
        - name: page 
          in: query 
          schema: 
            type: integer 
            default: 1 
        
        - name: limit 
          in: query 
          schema: 
            type: integer 
            default: 20 
      
      responses: 
        '200': 
          description: 조회 성공 
          content: 
            application/json: 
              schema: 
                type: object 
                properties: 
                  receipts: 
                    type: array 
                    items: 
                      $ref: '#/components/schemas/Receipt' 
                      
                  total: 
                    type: integer 
                  
                  page: 
                    type: integer 
                  
                  limit: 
                    type: integer 
        '401': 
          $ref: '#/components/responses/Unauthorized' 
  /api/receipts/{id}: 
    get: 
